<!DOCTYPE html>
<html lang="ru"> 
	<head>
		<title>Sign up</title>
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
	</head>
	<body>
        <div class="container">
            <form class="login">
                <p><b>SIGN UP</b></p>
                <p><input class="login_input" placeholder="Username" name="username"></p>
                <p><input class="login_input" placeholder="First Name" name="firstname"></p>
                <p><input class="login_input" placeholder="Last Name" name="lastname"></p>
                <p><input class="login_input" placeholder="Email" name="email"></p>
                <p><input class="login_input" placeholder="Password" name="password"></p>
                <p><input class="login_input" placeholder="Confirm Password" name="confirm"></p>
                <p><input type="submit" class="login_submit" value="Sign Up" name="submit"></p>
            </form>
        </div>
    </body>
</html>
